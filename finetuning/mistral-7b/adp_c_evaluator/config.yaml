# config.yaml — ADP-C Evaluator Behaviour
# NIKKO Phase 4 adapter training configuration.
# Governing spec: SPEC-400 §3.2, §4.3, §7.0.2, §7.3
# Director sign-off: 2026-05-10
#
# ADP-C is the internal critique adapter. It is NOT used in the main response
# pipeline — it is used exclusively by the EvaluatorAgent to score and screen
# candidate responses before they are returned to the user. It runs as a
# separate inference pass. It has no runtime α because it never combines with
# ADP-A or ADP-B at inference time.
#
# ADP-C also performs rejection sampling screening for ADP-A and ADP-B training
# (see REQ-400-LF3). This creates a bootstrap dependency: ADP-C must be trained
# first (or at minimum initialised from a capable baseline) before ADP-A/ADP-B
# rejection sampling pipelines are active.

# ── Training order note ───────────────────────────────────────────────────────
# [CONCEPT] Bootstrap dependency: ADP-C screens examples for ADP-A and ADP-B,
# so it must be trained (or approximated) first. In v0, we can bootstrap with
# zero-shot Mistral 7B as a weak evaluator, then retrain ADP-C on the outputs
# once ADP-A/ADP-B are producing real responses to critique.
training_order_priority: 1    # Train ADP-C before ADP-A and ADP-B.

# ── Base model ────────────────────────────────────────────────────────────────
base_model:
  name: mistralai/Mistral-7B-Instruct-v0.3
  quantization: 4bit
  torch_dtype: bfloat16

# ── LoRA adapter settings ─────────────────────────────────────────────────────
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

# ── Dataset ───────────────────────────────────────────────────────────────────
# ADP-C trains on self-generated red-line violation pairs. Format:
# (candidate_response, verdict, rationale) where verdict ∈ {PASS, FAIL}
# and rationale explains which red-line or hallucination pattern was detected.
dataset_mix:
  - id: adp_c_synthetic_redline
    weight: 1.00
    split: train
    generation_script: finetuning/adp_c_evaluator/data_loader.py

# ── Critique targets (spec-traced) ───────────────────────────────────────────
# ADP-C MUST learn to detect all of the following in candidate responses.
critique_targets:
  hallucination_detection:
    description: >
      Identify factual claims not grounded in retrieved evidence.
      Flag responses that assert clinical facts without citation.
    req_trace: [REQ-400-070, REQ-400-120]
  overconfidence_detection:
    description: >
      Identify responses that express certainty beyond what the evidence supports.
      Includes unhedged statements about mental health outcomes or diagnoses.
    req_trace: [REQ-400-070, REQ-400-111]
  clinical_authority_leakage:
    description: >
      Identify responses that adopt therapist/clinician framing, diagnostic
      language, or directive therapy instructions (REQ-400-052, REQ-400-130).
    req_trace: [REQ-400-070, REQ-400-130]
  red_line_violations:
    description: >
      Detect all R1–R15 red-line triggers as defined in SPEC-700 §7.
      Each red-line must have at minimum one positive (fires) and one negative
      (does not fire) training example per REQ-P6-001.
    req_trace: [REQ-400-070, REQ-400-120]
  citation_validation:
    description: >
      Verify that cited sources exist in the retrieval corpus and that
      claims match the cited content.
    req_trace: [REQ-400-070]

# ── Training hyperparameters ──────────────────────────────────────────────────
training:
  method: sft
  num_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  lr_scheduler: cosine
  warmup_ratio: 0.03
  max_seq_length: 2048          # Critique passes include full candidate responses as context.
  fp16: false
  bf16: true
  gradient_checkpointing: true

# ── Rejection sampling — asymmetric penalty ───────────────────────────────────
# Same 2:1 asymmetry as ADP-B (REQ-400-LF3). ADP-C is self-evaluating here —
# in v0 bootstrap, zero-shot Mistral acts as the weak screening oracle.
rejection_sampling:
  enabled: true
  evaluator_model: zero_shot_base  # Bootstrap: use base Mistral until ADP-C is trained.
  accept_threshold: 0.70
  asymmetric_penalty:
    false_negative_weight: 2.0
    false_positive_weight: 1.0
  req_trace: [REQ-400-LF3]

# ── Runtime note ─────────────────────────────────────────────────────────────
# ADP-C has NO runtime α — it never combines with ADP-A or ADP-B at inference.
# It is loaded separately by EvaluatorAgent only.
runtime_alpha: null

# ── Output ────────────────────────────────────────────────────────────────────
output:
  adapter_dir: finetuning/adp_c_evaluator/checkpoints/
  final_adapter: finetuning/adp_c_evaluator/adp_c_final/
  checkpoint_every_n_steps: 200
