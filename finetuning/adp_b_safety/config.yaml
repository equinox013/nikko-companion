# config.yaml — ADP-B Safety Alignment
# NIKKO Phase 4 adapter training configuration.
# Governing spec: SPEC-400 §3.2, §4.2, §7.0.2, §7.0.3
# Director sign-off: 2026-05-10
#
# This adapter enforces refusal, crisis escalation, boundary reinforcement,
# and AI-identity disclosure. It is active in ALL modes. In Crisis Mode it
# is the ONLY active adapter (α = 1.00). In Comfort/Guidance Mode it runs
# alongside ADP-A with α = 0.35 / 0.50 respectively.

# ── Base model ────────────────────────────────────────────────────────────────
base_model:
  name: mistralai/Mistral-7B-Instruct-v0.3
  quantization: 4bit
  torch_dtype: bfloat16

# ── LoRA adapter settings ─────────────────────────────────────────────────────
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

# ── Dataset ───────────────────────────────────────────────────────────────────
# ADP-B trains exclusively on self-generated adversarial pairs. No upstream
# license gate — clear under REQ-400-CL1.
dataset_mix:
  - id: adp_b_synthetic_adversarial
    weight: 1.00
    split: train
    generation_script: finetuning/adp_b_safety/data_loader.py

# ── Training hyperparameters ──────────────────────────────────────────────────
training:
  method: sft
  num_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  lr_scheduler: cosine
  warmup_ratio: 0.03
  max_seq_length: 1024          # Safety responses are typically short; 1024 is sufficient.
  fp16: false
  bf16: true
  gradient_checkpointing: true

# ── Rejection sampling — asymmetric penalty ───────────────────────────────────
# KEY DECISION (REQ-400-LF3, Director ratified 2026-05-10):
# False negatives (missed safety violations) are penalized at 2x the rate of
# false positives (over-refusals). This keeps the adapter from becoming an
# emotionally sterile refusal bot (REQ-400-140) while ensuring violations are
# never tolerated.
rejection_sampling:
  enabled: true
  evaluator_model: adp_c
  accept_threshold: 0.70
  asymmetric_penalty:
    false_negative_weight: 2.0  # Missed violation: costs 2x in the loss.
    false_positive_weight: 1.0  # Over-refusal: costs 1x in the loss.
  req_trace: [REQ-400-LF3]

# ── Required behavioral outputs (spec-traced) ─────────────────────────────────
# The adapter MUST learn to produce these response types reliably.
required_behaviors:
  - calm_refusal              # Refuse without aggression or excessive disclaimer stacking.
  - crisis_escalation         # Detect Level 2–3 distress; produce hotline + human referral.
  - boundary_reinforcement    # Re-state non-clinical AI identity when probed.
  - ai_identity_disclosure    # Proactively disclose AI nature when directly questioned.
  req_trace: [REQ-400-060, REQ-400-061]

# ── Forbidden outputs (spec-traced) ──────────────────────────────────────────
forbidden_behaviors:
  - diagnostic_labelling
  - directive_therapy_instructions
  - overconfident_clinical_claims
  req_trace: [REQ-400-080, REQ-400-111, REQ-400-130]

# ── Runtime adapter composition (inference only) ──────────────────────────────
runtime_alpha:
  comfort_mode: 0.35           # REQ-400-LF4
  guidance_mode: 0.50          # REQ-400-LF4
  crisis_mode: 1.00            # ADP-B is sole active adapter in Crisis Mode (SPEC-300)

# ── Output ────────────────────────────────────────────────────────────────────
output:
  adapter_dir: finetuning/adp_b_safety/checkpoints/
  final_adapter: finetuning/adp_b_safety/adp_b_final/
  checkpoint_every_n_steps: 200
