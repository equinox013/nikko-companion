# fly.toml app configuration file generated for nikko-backend on 2026-05-14T09:28:16+10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nikko-backend'
primary_region = 'syd'

[build]

[env]
  NIKKO_ENV = 'production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 100

[[services]]
  protocol = 'tcp'
  internal_port = 8080
  auto_stop_machines = 'off'
  auto_start_machines = true

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [[services.http_checks]]
    interval = '10s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'
    protocol = 'https'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
