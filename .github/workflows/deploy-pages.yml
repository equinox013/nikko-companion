# .github/workflows/deploy-pages.yml
# Deploys web/ to GitHub Pages using the official GitHub Actions approach.
# No PAT or separate repo needed -- works natively with a public repo.
#
# ONE-TIME SETUP:
#   GitHub repo -> Settings -> Pages -> Source -> "GitHub Actions"
#   That's it. This workflow handles the rest.

name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress if a new push arrives.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy web/ to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Verify web/ integrity
        run: |
          required=("Nikko.html" "styles.css" "loading.css" "loading.js" "nikko.jsx" "chat.jsx" "gate.jsx" "avatar.jsx")
          for f in "${required[@]}"; do
            if [ ! -f "web/$f" ]; then
              echo "ERROR: web/$f missing -- aborting deploy"
              exit 1
            fi
          done
          echo "All required files present."

      # Compile JSX to JS using esbuild (zero-config, no Babel runtime needed).
      # esbuild transform mode converts JSX syntax to React.createElement()
      # calls without module bundling -- correct for this globals-based
      # architecture where Reac