# .github/workflows/deploy-pages.yml
# Deploys web/ to GitHub Pages using the official GitHub Actions approach.
# No PAT or separate repo needed -- works natively with a public repo.
#
# ONE-TIME SETUP:
#   GitHub repo -> Settings -> Pages -> Source -> "GitHub Actions"
#   That's it. This workflow handles the rest.

name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress if a new push arrives.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy web/ to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Verify web/ integrity
        run: |
          required=("Nikko.html" "styles.css" "loading.css" "loading.js" "nikko.jsx" "chat.jsx" "gate.jsx" "avatar.jsx")
          for f in "${required[@]}"; do
            if [ ! -f "web/$f" ]; then
              echo "ERROR: web/$f missing -- aborting deploy"
              exit 1
            fi
          done
          echo "All required files present."

      # Compile JSX to JS using esbuild. Transform mode (no --bundle flag)
      # converts JSX to React.createElement() calls without resolving modules --
      # correct for this globals-based architecture where React + ReactDOM
      # are provided by CDN script tags loaded before the component files.
      - name: Compile JSX to JS
        run: |
          cd web
          npx --yes esbuild@0.25.3 \
            avatar.jsx gate.jsx nikko-data.jsx memory.jsx panels.jsx agent-debug.jsx chat.jsx nikko.jsx \
            --loader:.jsx=jsx \
            --jsx-factory=React.createElement \
            --jsx-fragment=React.Fragment \
            --outdir=. \
            --log-level=info
          echo "Compiled files:"
          ls -lh avatar.js gate.js nikko-data.js memory.js panels.js agent-debug.js chat.js nikko.js

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload web/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
