# fly.toml — Nikko backend, Fly.io app configuration.
# Phase 7 MVP infra (2026-05-14).
#
# IMPORTANT: Deploy from the repo root, NOT from backend/:
#   cd "D:\Git Repos\nikko-companion"
#   fly deploy
#
# Build context is the repo root so Docker can reach orchestration/, agents/,
# retrieval/, and docs/schemas/ (all required by NikkoPipeline at runtime).
# See Dockerfile at repo root for the full build spec.

app = 'nikko-backend'
primary_region = 'syd'

[build]
  # Dockerfile is at repo root (moved from backend/ in Phase 7 agent-wiring).
  # No dockerfile key needed — Fly uses ./Dockerfile by default.

[env]
  NIKKO_ENV = 'production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 100

[[services]]
  protocol = 'tcp'
  internal_port = 8080
  auto_stop_machines = 'off'
  auto_start_machines = true

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [[services.http_checks]]
    interval = '10s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'
    protocol = 'https'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
